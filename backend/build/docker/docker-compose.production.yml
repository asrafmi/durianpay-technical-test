services:
  backend:
    build:
      context: ../../..
      dockerfile: backend/build/docker/Dockerfile
      target: production
    image: durianpay-backend:latest
    container_name: durianpay-backend
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      HTTP_ADDR: ":8080"
      OPENAPIYAML_LOCATION: "../openapi.yaml"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-replace-me}"
      JWT_EXPIRED: "${JWT_EXPIRED:-24h}"
      SQLITE_DB_PATH: "/data/dashboard.db"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      ALLOWED_METHODS: "${ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}"
      ALLOWED_HEADERS: "${ALLOWED_HEADERS:-Origin, Content-Type, Accept, Authorization}"
    volumes:
      - backend-data:/data
    restart: unless-stopped

volumes:
  backend-data:
