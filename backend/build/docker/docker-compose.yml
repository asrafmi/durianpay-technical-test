services:
  backend:
    build:
      context: ../../..
      dockerfile: backend/build/docker/Dockerfile
      target: dev
    image: durianpay-backend:dev
    container_name: durianpay-backend-dev
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      HTTP_ADDR: ":8080"
      OPENAPIYAML_LOCATION: "../openapi.yaml"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-replace-me}"
      JWT_EXPIRED: "${JWT_EXPIRED:-24h}"
      SQLITE_DB_PATH: "/data/dashboard.db"
    volumes:
      - ../../../backend:/src/backend
      - ../../../openapi.yaml:/src/openapi.yaml
      - backend-dev-data:/data
    restart: unless-stopped

volumes:
  backend-dev-data:
