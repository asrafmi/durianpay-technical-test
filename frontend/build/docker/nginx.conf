server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/wasm image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets (JS/CSS/fonts/images emitted by Vite) - safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html and config.js must always be revalidated so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location = /config.js {
        add_header Cache-Control "no-cache";
    }
}
