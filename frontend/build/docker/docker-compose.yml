services:
  frontend:
    build:
      context: ../../..
      dockerfile: frontend/build/docker/Dockerfile
      target: dev
    image: durianpay-frontend:dev
    container_name: durianpay-frontend-dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../../../frontend:/app
      - /app/node_modules
    restart: unless-stopped
