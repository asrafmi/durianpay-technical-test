services:
  frontend:
    build:
      context: ../../..
      dockerfile: frontend/build/docker/Dockerfile
      target: production
    image: durianpay-frontend:latest
    container_name: durianpay-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      API_BASE_URL: "${API_BASE_URL:-http://localhost:8080}"
    restart: unless-stopped
